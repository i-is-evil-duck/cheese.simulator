<!DOCTYPE html>
<html>
<head>
<title>Cursor Follower</title>

<style>
html {
    cursor: none; /* hide default cursor */
}
body {
    margin: 0;
    overflow: hidden;
    position: relative;
}
#follow {
    position: absolute;
    z-index: 9999;
    pointer-events: none;
}
.newImg {
    position: absolute;
    z-index: 0;
    user-select: none;
    -webkit-user-drag: none; /* prevent drag in Chrome/Safari */
    user-drag: none;          /* prevent drag in other browsers */
}
#follow img {
    pointer-events: none;
}
#counter {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 20px;
    color: black;
    z-index: 10000;
}
</style>

</head>

<body>

<div id="follow">
    <img src="cheese-man.gif" width="100" height="100">
</div>

<div id="counter">Counter: 0</div>

<audio id="audio" src="sound.mp3"></audio>

<script>
let clickCounter = 0;
const imageSize = { width:100, height:100 };

const mp3Files = [
    "sound1.mp3",
    "sound2.mp3",
    "sound3.mp3",
    "sound4.mp3",
    "sound5.mp3"
];

const follower = document.getElementById("follow");
const counter = document.getElementById("counter");
const audio = document.getElementById("audio");

function updateFollowerPosition(event) {
    const followerX = event.pageX - imageSize.width / 2;
    const followerY = event.pageY - imageSize.height / 2;

    follower.style.left = followerX + "px";
    follower.style.top = followerY + "px";
}

function getRandomPosition() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;

    const randomX = Math.floor(Math.random() * (screenWidth - 40));
    const randomY = Math.floor(Math.random() * (screenHeight - 40));

    return {x: randomX, y: randomY};
}

function createRandomImage() {
    const pos = getRandomPosition();

    const img = document.createElement("img");
    img.src = "2.png";
    img.className = "newImg";

    img.style.left = pos.x + "px";
    img.style.top = pos.y + "px";

    // Make image non-draggable
    img.draggable = false;

    document.body.appendChild(img);

    img.addEventListener("click", function() {
        const randomIndex = Math.floor(Math.random() * mp3Files.length);
        audio.src = mp3Files[randomIndex];
        audio.play();

        img.remove();
        clickCounter++;
        counter.innerText = "Counter: " + clickCounter;
    });

    const randomInterval = 50 + Math.random() * 1000;
    setTimeout(createRandomImage, randomInterval);
}

document.addEventListener("mousemove", updateFollowerPosition);
createRandomImage();
</script>

</body>
</html>
